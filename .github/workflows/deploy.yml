name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Create archive
        run: tar -czf /tmp/site.tar.gz --exclude='.git' --exclude='.github' --exclude='README.md' --exclude='package*.json' --exclude='node_modules' .

      - name: Install deploy dependencies
        run: |
          cd /tmp
          npm init -y
          npm install axios tus-js-client

      - name: Deploy to Hostinger
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_USERNAME: ${{ secrets.HOSTINGER_USERNAME }}
          NODE_PATH: /tmp/node_modules
        run: |
          cat > /tmp/deploy.mjs << 'SCRIPT'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/node_modules/');
          const axios = require('axios');
          const tus = require('tus-js-client');
          import fs from 'fs';
          import path from 'path';

          const API = 'https://developers.hostinger.com';
          const TOKEN = process.env.HOSTINGER_API_TOKEN;
          const USERNAME = process.env.HOSTINGER_USERNAME;
          const DOMAIN = 'frankaburamez.tech';
          const ARCHIVE = '/tmp/site.tar.gz';

          async function deploy() {
            console.log('Step 1: Getting upload credentials...');
            const credsResp = await axios.default.post(`${API}/api/hosting/v1/files/upload-urls`, {
              username: USERNAME,
              domain: DOMAIN
            }, {
              headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }
            });
            const { url: uploadUrl, auth_key: authToken, rest_auth_key: authRestToken } = credsResp.data;
            console.log('Got upload credentials');

            const stats = fs.statSync(ARCHIVE);
            const basename = path.basename(ARCHIVE);
            const cleanUrl = uploadUrl.replace(/\/$/, '');
            const fullUrl = `${cleanUrl}/${basename}?override=true`;
            const headers = {
              'X-Auth': authToken,
              'X-Auth-Rest': authRestToken,
              'upload-length': stats.size.toString(),
              'upload-offset': '0'
            };

            console.log('Step 2: Pre-upload POST...');
            await axios.default.post(fullUrl, '', { headers, validateStatus: s => s === 201 });

            console.log('Step 3: Uploading archive via TUS...');
            await new Promise((resolve, reject) => {
              const upload = new tus.Upload(fs.createReadStream(ARCHIVE), {
                uploadUrl: fullUrl,
                retryDelays: [1000, 2000, 4000],
                chunkSize: 10485760,
                headers,
                uploadSize: stats.size,
                metadata: { filename: basename },
                onError: (err) => { console.error('TUS error:', err); reject(err); },
                onSuccess: () => { console.log('Upload complete'); resolve(); }
              });
              upload.start();
            });

            console.log('Step 4: Triggering deployment...');
            const deployResp = await axios.default.post(
              `${API}/api/hosting/v1/accounts/${USERNAME}/websites/${DOMAIN}/deploy`,
              { archive_path: basename },
              { headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' } }
            );
            console.log('Deploy triggered successfully:', JSON.stringify(deployResp.data));
          }

          deploy().catch(err => { console.error('Deploy failed:', err.message); process.exit(1); });
          SCRIPT
          node /tmp/deploy.mjs
