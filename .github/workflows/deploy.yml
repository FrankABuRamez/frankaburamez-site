name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create archive
        run: tar -czf site.tar.gz --exclude='.git' --exclude='.github' --exclude='README.md' .

      - name: Get upload credentials
        id: creds
        run: |
          RESP=$(curl -s -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.HOSTINGER_USERNAME }}/websites/frankaburamez.tech/upload-credentials")
          echo "upload_url=$(echo $RESP | jq -r '.url')" >> $GITHUB_OUTPUT
          echo "auth_key=$(echo $RESP | jq -r '.auth_key')" >> $GITHUB_OUTPUT
          echo "rest_auth_key=$(echo $RESP | jq -r '.rest_auth_key')" >> $GITHUB_OUTPUT

      - name: Upload archive
        run: |
          curl -s -X POST "${{ steps.creds.outputs.upload_url }}" \
            -H "Authorization: Bearer ${{ steps.creds.outputs.rest_auth_key }}" \
            -F "file=@site.tar.gz"

      - name: Trigger deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.HOSTINGER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"archive_path": "site.tar.gz"}' \
            "https://developers.hostinger.com/api/hosting/v1/accounts/${{ secrets.HOSTINGER_USERNAME }}/websites/frankaburamez.tech/deploy"
